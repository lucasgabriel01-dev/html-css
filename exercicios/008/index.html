<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>negrito e italiano </title>
    <style>mark {background-color: blue;
    }</style>
</head>
<body>
    <h1>destaques</h1>
    <p><b>negrito</b></p>
    <p><strong>negrito</strong></p>
    <h2>italico</h2>
    <p><i>italico</i></p>
    <h2>marcadores de texto</body><h2>
    <p><mark>marcar texto</mark></p>
    <h2>grande e pequeno</h2>
    <p><small>pequeno</small></p>
    <p><big>
    grande 
    </big></p>
    <h2>texto deletado</h2>
    <p><del> ccoococoococ</del></p>
    <h2>texto inserido</h2>
    <p><ins>inserido </ins></p>
    <h2>texto sobescreito</h2>
    <p>x<sup>20 </sup>+3</p>
    <h2>texto subescreito</h2>
    <p>H<sub>2</sub>0</p>
</body>
</html>
